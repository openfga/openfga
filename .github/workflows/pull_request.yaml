name: Pull Request
on:
  merge_group:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          args: -v -c .golangci.yaml

  # Fast unit tests — all packages except storage backends and integration tests
  tests-unit:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true

      - id: go-cache-paths
        name: Get Go cache paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Unit Tests
        run: make test-unit

      - name: upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverageunit.out
          flags: unit
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Storage integration tests — sqlite, mysql, postgres, memory
  tests-storage:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true

      - id: go-cache-paths
        name: Get Go cache paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Storage Integration Tests
        run: make test-storage

      - name: upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverageunit.out
          flags: storage
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Matrix / integration tests — check, listobjects, listusers, authzen, run, validatemodels
  tests-matrix:
    runs-on: ubuntu-latest-4-cores
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true

      - id: go-cache-paths
        name: Get Go cache paths
        run: |
          echo "go-build=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"

      - name: Go build cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.go-cache-paths.outputs.go-build }}
          key: ${{ runner.os }}-go-build-${{ hashFiles('**/*.go', 'go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Matrix Integration Tests
        run: make test-matrix

      - name: upload coverage to codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverageunit.out
          flags: matrix
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  # Aggregate job to satisfy branch protection rules that require "tests" status
  tests:
    runs-on: ubuntu-latest
    needs: [tests-unit, tests-storage, tests-matrix]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.tests-unit.result }}" != "success" || \
                "${{ needs.tests-storage.result }}" != "success" || \
                "${{ needs.tests-matrix.result }}" != "success" ]]; then
            echo "One or more test jobs failed"
            exit 1
          fi

  goreleaser-dryrun:
    name: Dry Run GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check for release-related changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            release:
              - '.goreleaser.yaml'
              - 'Dockerfile'
              - 'Dockerfile.goreleaser'
              - 'cmd/openfga/**'

      - name: Set up Go
        if: steps.changes.outputs.release == 'true' || github.event_name == 'merge_group'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true
          cache: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        if: steps.changes.outputs.release == 'true' || github.event_name == 'merge_group'

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.changes.outputs.release == 'true' || github.event_name == 'merge_group'

      - name: Dry Run GoReleaser
        if: steps.changes.outputs.release == 'true' || github.event_name == 'merge_group'
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --config .goreleaser.yaml --snapshot --skip sign,publish,announce

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          go-version-file: go.mod
          repo-checkout: false

  docker-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and push openfga/openfga:dockertest
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          file: Dockerfile
          push: false # don't publish the built container for Docker tests
          load: true
          tags: "openfga/openfga:dockertest"

      - name: Docker Tests
        run: make test-docker

  go-bench:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run benchmarks when performance-sensitive code changes
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # to be able to retrieve the last commit in main
          persist-credentials: false

      - name: Check for performance-sensitive changes
        id: changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            perf:
              - 'internal/graph/**'
              - 'internal/listobjects/**'
              - 'internal/check/**'
              - 'internal/planner/**'
              - 'internal/iterator/**'
              - 'internal/containers/**'
              - 'pkg/storage/*.go'
              - 'pkg/storage/sqlcommon/**'
              - 'pkg/server/commands/**'
              - 'pkg/typesystem/**'

      - name: Set up Go
        if: steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: './go.mod'
          cache-dependency-path: './go.sum'
          check-latest: true

      # Run benchmark with `go test -bench` and stores the output to a file
      - name: Run benchmark
        if: steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group'
        run: |
          set -o pipefail
          make test-bench | tee ${{ github.sha }}_bench_output.txt

      - name: Get CPU information
        if: steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group'
        uses: kenchan0130/actions-system-info@59699597e84e80085a750998045983daa49274c4 # v1
        id: system-info

      - name: Get Main branch SHA
        if: steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group'
        id: get-main-branch-sha
        run: |
          SHA=$(git rev-parse origin/main)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Get benchmark JSON from main branch
        if: steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group'
        id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ./cache/benchmark-data.json
          # Key ordering (OS-CPU-SHA) identical to main.yaml's saved key. restore-keys
          # falls back to the most recent same-hardware baseline from any prior
          # main commit when the exact main-SHA baseline is missing (timing race,
          # failed main run, eviction) — never comparing across different CPUs.
          key: ${{ runner.os }}-${{ steps.system-info.outputs.cpu-model }}-${{ steps.get-main-branch-sha.outputs.sha }}-go-benchmark
          restore-keys: |
            ${{ runner.os }}-${{ steps.system-info.outputs.cpu-model }}-

      # A fallback (restore-keys) hit sets cache-hit=false but populates
      # cache-matched-key, so branch on cache-matched-key to cover exact AND
      # fallback baselines. Empty cache-matched-key means no same-hardware
      # baseline exists at all.
      - name: Note fallback baseline used
        if: steps.cache.outputs.cache-hit != 'true' && steps.cache.outputs.cache-matched-key != '' && (steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group')
        run: |
          echo "::notice title=Benchmark baseline is not exact::No baseline for the exact main commit; comparing against the most recent same-hardware baseline ('${{ steps.cache.outputs.cache-matched-key }}')."

      - name: Compare benchmarks with Main
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        if: steps.cache.outputs.cache-matched-key != '' && (steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group')
        with:
          # What benchmark tool the output.txt came from
          tool: 'go'
          # Where the output from the benchmark tool is stored
          output-file-path: ${{ github.sha }}_bench_output.txt
          # Where the benchmarks in main are (to compare)
          external-data-json-path: ./cache/benchmark-data.json
          # Do not save the data
          save-data-file: false
          # Workflow will fail when an alert happens
          fail-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Enable Job Summary for PRs
          summary-always: true

      - name: Run benchmarks but don't compare to Main branch
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        if: steps.cache.outputs.cache-matched-key == '' && (steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group')
        with:
          # What benchmark tool the output.txt came from
          tool: 'go'
          # Where the output from the benchmark tool is stored
          output-file-path: ${{ github.sha }}_bench_output.txt
          # Write benchmarks to this file, do not publish to GitHub Pages
          save-data-file: false
          external-data-json-path: ./cache/benchmark-data.json
          # Enable Job Summary for PRs
          summary-always: true

      # When no same-hardware baseline exists at all, benchmarks ran but nothing
      # was compared. Surface this loudly (annotation + job summary) so a green
      # check is never mistaken for "no regression". Job intentionally stays green.
      - name: Warn that regression check was skipped
        if: steps.cache.outputs.cache-matched-key == '' && (steps.changes.outputs.perf == 'true' || github.event_name == 'merge_group')
        run: |
          echo "::warning title=Benchmark regression check skipped::No same-hardware baseline found for OS='${{ runner.os }}' CPU='${{ steps.system-info.outputs.cpu-model }}'. Benchmarks ran but were NOT compared against main."
          {
            echo "### ⚠️ Benchmark regression check skipped"
            echo "No same-hardware baseline was available to compare against. Benchmarks ran but no regression check was performed."
          } >> "$GITHUB_STEP_SUMMARY"
