services:
  postgres:
    image: postgres:17
    container_name: postgres
    command: postgres -c 'max_connections=100'
    networks:
      - default
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    depends_on:
      postgres:
        condition: service_healthy
    image: openfga/openfga:latest
    container_name: migrate
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://postgres:password@postgres:5432/postgres?sslmode=disable
    command: migrate
    networks:
      - default

  openfga:
    depends_on:
      migrate:
        condition: service_completed_successfully
    image: openfga/openfga:latest
    container_name: openfga
    command: run
    environment:
      - OPENFGA_DATASTORE_ENGINE=postgres
      - OPENFGA_DATASTORE_URI=postgres://postgres:password@postgres:5432/postgres?sslmode=disable
      - OPENFGA_DATASTORE_MAX_OPEN_CONNS=100 #see postgres container
      - OPENFGA_PLAYGROUND_ENABLED=true
      - OPENFGA_TRACE_ENABLED=true
      - OPENFGA_TRACE_SAMPLE_RATIO=1.0
      - OPENFGA_EXPERIMENTALS=shadow_weighted_graph_check,enable-check-optimizations,enable-list-objects-optimizations,datastore_throttling
      - OPENFGA_CHECK_DISPATCH_THROTTLING_ENABLED=true
      - OPENFGA_CHECK_DISPATCH_THROTTLING_FREQUENCY=50ms
      - OPENFGA_CHECK_DISPATCH_THROTTLING_THRESHOLD=3000
      - OPENFGA_CHECK_DISPATCH_THROTTLING_MAX_THRESHOLD=4500
      - OPENFGA_LIST_OBJECTS_DISPATCH_THROTTLING_ENABLED=true
      - OPENFGA_LIST_OBJECTS_DISPATCH_THROTTLING_FREQUENCY=50ms
      - OPENFGA_LIST_OBJECTS_DISPATCH_THROTTLING_THRESHOLD=3000
      - OPENFGA_LIST_OBJECTS_DISPATCH_THROTTLING_MAX_THRESHOLD=4500
      - OPENFGA_LIST_USERS_DISPATCH_THROTTLING_ENABLED=true
      - OPENFGA_LIST_USERS_DISPATCH_THROTTLING_FREQUENCY=50ms
      - OPENFGA_LIST_USERS_DISPATCH_THROTTLING_THRESHOLD=3000
      - OPENFGA_LIST_USERS_DISPATCH_THROTTLING_MAX_THRESHOLD=4500
      - OPENFGA_CHECK_CACHE_LIMIT=1000000
      - OPENFGA_LIST_OBJECTS_ITERATOR_CACHE_ENABLED=true
      - OPENFGA_LIST_OBJECTS_ITERATOR_CACHE_MAX_RESULTS=10000
      - OPENFGA_LIST_OBJECTS_ITERATOR_CACHE_TTL=10s
      - OPENFGA_CHECK_ITERATOR_CACHE_ENABLED=true
      - OPENFGA_CHECK_ITERATOR_CACHE_MAX_RESULTS=1001
      - OPENFGA_CHECK_ITERATOR_CACHE_TTL=10s
      - OPENFGA_CHECK_QUERY_CACHE_ENABLED=true
      - OPENFGA_CHECK_QUERY_CACHE_TTL=10s
      - OPENFGA_CHECK_DATASTORE_THROTTLE_THRESHOLD=150
      - OPENFGA_CHECK_DATASTORE_THROTTLE_DURATION=5ms
      - OPENFGA_LIST_OBJECTS_DATASTORE_THROTTLE_THRESHOLD=150
      - OPENFGA_LIST_OBJECTS_DATASTORE_THROTTLE_DURATION=5ms
      - OPENFGA_LIST_USERS_DATASTORE_THROTTLE_THRESHOLD=150
      - OPENFGA_LIST_USERS_DATASTORE_THROTTLE_DURATION=5ms
      - OPENFGA_LIST_OBJECTS_MAX_RESULTS=10000
    networks:
      - default
    ports:
      - "8080:8080" #http
      - "8081:8081" #grpc
      - "3000:3000" #playground
      - "2112:2112" #prometheus metrics
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/grpc_health_probe",
          "-addr=openfga:8081"
        ]
      interval: 5s
      timeout: 30s
      retries: 3
